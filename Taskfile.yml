version: '3'

vars:
  ContainerName: aqualog-frontend
  Version:
    sh: poetry run cz version --project
  MajorVersion:
    sh: poetry run cz version --project --major

dotenv:
  - ../.env

tasks:
  default:
    desc: Show available tasks
    cmds:
      - task --list
    
  setup:
    desc: Set up the project environment
    cmds:
      - cmd: ./tools/setup.sh

  build:
    desc: Build the project
    cmds:
      - cmd: source .env && docker build -t {{.ContainerName}}:latest .
      - cmd: docker image tag {{.ContainerName}}:latest {{.ContainerName}}:{{.Version}}

  run:
    desc: Run the project in a Docker container
    cmds:
      - cmd: |
          docker run --rm \
          -e AQUALOG_OAUTH_ISSUER_URL=${AQUALOG_OAUTH_ISSUER_URL} \
          -e AQUALOG_OAUTH_CLIENT_ID=${AQUALOG_OAUTH_CLIENT_ID} \
          -e AQUALOG_OAUTH_AUTH_CALLBACK_URL=${AQUALOG_OAUTH_AUTH_CALLBACK_URL} \
          -e AQUALOG_OAUTH_SCOPES='${AQUALOG_OAUTH_SCOPE}' \
          -e AQUALOG_API_BASE_URL=${AQUALOG_API_BASE_URL} \
          -e AQUALOG_OAUTH_AUTH_LOGOUT_URL=${AQUALOG_OAUTH_AUTH_LOGOUT_URL} \
          -p 9000:8000 \
          {{.ContainerName}}:{{.Version}}

  scan:
    desc: Run Trivy scan for vulnerabilities
    cmds:
      - cmd: |
          docker run \
          --rm \
          -v /var/run/docker.sock:/var/run/docker.sock \
          -v /var/cache/trivy:/tmp \
          -v ./.data/trivy:/data \
          aquasec/trivy image \
          --no-progress \
          --format table --output /data/scan-{{.Version}}.txt \
          --scanners vuln,secret \
          --image-config-scanners misconfig,secret \
          --severity UNKNOWN,LOW,MEDIUM,HIGH,CRITICAL \
          --cache-dir /tmp/trivy \
          {{.ContainerName}}:{{.Version}}

  server:
    desc: Start the API server locally
    env:
      # AQUALOG_APP_ENV: "{{.AQUALOG_APP_ENV}}"
      # AQUALOG_OAUTH_ISSUER_URL: "{{.AQUALOG_OAUTH_ISSUER_URL}}"
      # AQUALOG_OAUTH_AUDIENCE: "{{.AQUALOG_OAUTH_CLIENT_ID}}"
      # REQUESTS_CA_BUNDLE: "{{.CA_BUNDLE}}"
      # SSL_CERT_FILE: "{{.CA_BUNDLE}}"
      # CURL_CA_BUNDLE: "{{.CA_BUNDLE}}"
      AQUALOG_OIDC_REDIRECT_URI: "http://localhost:${FRONTEND_PORT_HTTP}/auth/callback"
      FRONTEND_DIR: ./dist
    cmds:
      - cmd: env | grep AQUALOG_
      - cmd: npm run build
      - cmd: "uvicorn backend.main:app --reload --host 0.0.0.0 --port ${FRONTEND_PORT_HTTP}"

  test:
    desc: Run the test suite with coverage summary and HTML test report
    env:
      AQUALOG_APP_ENV: test
    cmds:
      - mkdir -p artifacts/tests
      - .venv/bin/pytest -q --cov=aqualog_api --cov-report=term-missing --html=artifacts/tests/index.html

  coverage:
    desc: Run tests with coverage outputs and HTML test report
    env:
      AQUALOG_APP_ENV: test
    cmds:
      - mkdir -p artifacts/coverage
      - .venv/bin/pytest -q --cov=aqualog_api --cov-report=term-missing --cov-report=html:artifacts/coverage --cov-report=xml --html=artifacts/tests/index.html

  clean:
    desc: Clean up build artifacts and temporary files
    cmds:
      - cmd: docker compose down --volumes --remove-orphans
      - cmd: rm -rf .data
      - cmd: rm -rf artifacts
    
  clean-all:
    desc: Clean up all build artifacts, temporary files, and Docker images
    cmds:
      - task: clean
      - cmd: docker rmi aqualog-backend-api:latest --force
      - cmd: rm -rf .env
      - cmd: rm -rf .venv
